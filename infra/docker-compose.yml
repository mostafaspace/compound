name: compound-management

services:
  api:
    build:
      context: ..
      dockerfile: infra/api/Dockerfile
    working_dir: /var/www/html
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      ADMIN_APP_URL: http://localhost:3000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: compound
      DB_USERNAME: compound
      DB_PASSWORD: compound_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: compound-local
      REVERB_APP_KEY: compound-local-key
      REVERB_APP_SECRET: compound-local-secret
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: compound_minio
      AWS_SECRET_ACCESS_KEY: compound_minio_secret
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: compound-local
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  horizon:
    build:
      context: ..
      dockerfile: infra/api/Dockerfile
    working_dir: /var/www/html
    command: ["php", "artisan", "horizon"]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: compound
      DB_USERNAME: compound
      DB_PASSWORD: compound_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: compound-local
      REVERB_APP_KEY: compound-local-key
      REVERB_APP_SECRET: compound-local-secret
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    volumes:
      - ../apps/api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      api:
        condition: service_started

  admin:
    image: node:22-alpine
    working_dir: /workspace
    command: ["sh", "-c", "npm install && npm run dev -w apps/admin -- --hostname 0.0.0.0 --port 3000"]
    environment:
      API_BASE_URL: http://api:8000/api/v1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_REVERB_APP_KEY: compound-local-key
      NEXT_PUBLIC_REVERB_HOST: 127.0.0.1
      NEXT_PUBLIC_REVERB_PORT: 8080
      NEXT_PUBLIC_REVERB_SCHEME: http
    ports:
      - "3001:3000"
    volumes:
      - ..:/workspace
      - admin_node_modules:/workspace/node_modules
      - admin_next:/workspace/apps/admin/.next
    depends_on:
      api:
        condition: service_started
      reverb:
        condition: service_started

  reverb:
    build:
      context: ..
      dockerfile: infra/api/Dockerfile
    working_dir: /var/www/html
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: compound
      DB_USERNAME: compound
      DB_PASSWORD: compound_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_APP_ID: compound-local
      REVERB_APP_KEY: compound-local-key
      REVERB_APP_SECRET: compound-local-secret
      REVERB_HOST: localhost
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    ports:
      - "8080:8080"
    volumes:
      - ../apps/api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      api:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: compound
      MYSQL_USER: compound
      MYSQL_PASSWORD: compound_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3307:3306"
    volumes:
      - ../.docker-data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ../.docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: compound_minio
      MINIO_ROOT_PASSWORD: compound_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../.docker-data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set compound http://minio:9000 compound_minio compound_minio_secret &&
        mc mb --ignore-existing compound/compound-local
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  api_vendor:
  admin_node_modules:
  admin_next:
